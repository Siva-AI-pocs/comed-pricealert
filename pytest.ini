[pytest]
asyncio_mode = auto

# Run only unit/integration tests by default (fast, no network).
# To run E2E tests:  pytest tests/test_e2e.py --browser chromium
addopts = --ignore=tests/test_e2e.py

[pytest.ini_options]
markers =
    e2e: live end-to-end tests against Render (requires network)
    slow: intentionally slow tests
